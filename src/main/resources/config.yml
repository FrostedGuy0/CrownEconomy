general:
  prefix: "&8[&bCrown &3Economy&8] &r"
  currency-symbol: "$"
  decimal-places: 2
  date-format: "MM/dd/yyyy HH:mm"

auction-house:
  enabled: true
  # GLOBAL = one shared AH across all enabled worlds.
  # PER_WORLD = every world gets its own AH file and inventory.
  # GROUPED = worlds with the same `group` share one AH, ungrouped worlds stay isolated.
  # If GROUPED is enabled and no explicit `group` entries are configured, standard world families
  # like `world`, `world_nether`, and `world_the_end` will share automatically.
  mode: GLOBAL
  default-world-settings:
    enabled: true
  worlds:
    # Example grouped setup:
    # spawn:
    #   enabled: false
    # world:
    #   enabled: true
    #   group: survival_shared
    # world_nether:
    #   enabled: true
    #   group: survival_shared
    # world_the_end:
    #   enabled: true
    # world:
    #   enabled: true
    #   group: survival_group
    # world_nether:
    #   enabled: true
    #   group: survival_group
    # world_the_end:
    #   enabled: true
    #   group: survival_group
    # world2:
    #   enabled: true
    #   group: world2_group
    # world2_nether:
    #   enabled: false
    #   group: world2_group
  # 0 = unlimited.
  max-auction-house-listings: 0
  # 0 = unlimited.
  max-transaction-history: 0
  max-price: 1000000.0
  min-price: 1.0
  # Set to 0 for permanent listings.
  default-duration-hours: 0
  # Set to 0 to remove the cap.
  max-duration-hours: 168
  tax-rate: 5.0
  auto-save-seconds: 60
  expiry-check-seconds: 60
  return-check-seconds: 60

  listing-limits:
    - permission: "crowneconomy.admin"
      limit: 100
    - permission: "crowneconomy.ah.maxlistings.mvp"
      limit: 20
    - permission: "crowneconomy.ah.maxlistings.vip"
      limit: 10
    - permission: "default"
      limit: 5

  blacklisted-materials:
    - AIR
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - STRUCTURE_BLOCK
    - JIGSAW

  categories:
    enabled: true
    list:
      - name: "All"
        icon: COMPASS
        match-all: true
      - name: "Weapons"
        icon: DIAMOND_SWORD
        materials:
          - WOODEN_SWORD
          - STONE_SWORD
          - IRON_SWORD
          - GOLDEN_SWORD
          - DIAMOND_SWORD
          - NETHERITE_SWORD
          - BOW
          - CROSSBOW
          - TRIDENT
        keywords:
          - SWORD
          - BOW
          - CROSSBOW
          - TRIDENT
      - name: "Armor"
        icon: DIAMOND_CHESTPLATE
        materials:
          - LEATHER_HELMET
          - LEATHER_CHESTPLATE
          - LEATHER_LEGGINGS
          - LEATHER_BOOTS
          - CHAINMAIL_HELMET
          - CHAINMAIL_CHESTPLATE
          - CHAINMAIL_LEGGINGS
          - CHAINMAIL_BOOTS
          - IRON_HELMET
          - IRON_CHESTPLATE
          - IRON_LEGGINGS
          - IRON_BOOTS
          - DIAMOND_HELMET
          - DIAMOND_CHESTPLATE
          - DIAMOND_LEGGINGS
          - DIAMOND_BOOTS
          - NETHERITE_HELMET
          - NETHERITE_CHESTPLATE
          - NETHERITE_LEGGINGS
          - NETHERITE_BOOTS
        keywords:
          - HELMET
          - CHESTPLATE
          - LEGGINGS
          - BOOTS
      - name: "Tools"
