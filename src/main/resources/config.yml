          - STONE_SHOVEL
          - IRON_SHOVEL
          - GOLDEN_SHOVEL
          - DIAMOND_SHOVEL
          - NETHERITE_SHOVEL
          - FISHING_ROD
          - FLINT_AND_STEEL
          - SHEARS
        keywords:
